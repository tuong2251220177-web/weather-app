name: Deploy to WSL Runner

on:
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, wsl, docker, cd]

    steps:
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Create deploy directory
        run: mkdir -p ~/deploy-weather-fastapi

      - name: Write compose file
        run: |
          cat > ~/deploy-weather-fastapi/docker-compose.yml <<'EOF'
          services:
            app:
              image: ghcr.io/${{ github.repository }}/weather-fastapi:latest
              container_name: weather-fastapi
              restart: unless-stopped
              ports:
                - "8090:8000"
          EOF

      - name: Pull latest image
        run: docker compose -f ~/deploy-weather-fastapi/docker-compose.yml pull

      - name: Restart app
        run: docker compose -f ~/deploy-weather-fastapi/docker-compose.yml up -d

      - name: Show running containers
        run: docker ps